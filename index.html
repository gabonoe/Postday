<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>tanda de penales</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><circle cx='256' cy='256' r='240' fill='white' stroke='black' stroke-width='8'/><path d='M256 16L180 100L80 80L120 180L40 280L140 280L180 380L256 300L332 380L372 280L472 280L392 180L432 80L332 100Z' fill='white' stroke='black' stroke-width='6'/><path d='M256 16L180 100L256 180L332 100Z' fill='white' stroke='black' stroke-width='4'/><path d='M80 80L120 180L180 100Z' fill='white' stroke='black' stroke-width='4'/><path d='M432 80L392 180L332 100Z' fill='white' stroke='black' stroke-width='4'/><path d='M120 180L40 280L140 280L256 180Z' fill='white' stroke='black' stroke-width='4'/><path d='M392 180L472 280L372 280L256 180Z' fill='white' stroke='black' stroke-width='4'/><path d='M140 280L180 380L256 300L256 180Z' fill='white' stroke='black' stroke-width='4'/><path d='M372 280L332 380L256 300L256 180Z' fill='white' stroke='black' stroke-width='4'/></svg>" type="image/svg+xml">
  <link rel="stylesheet" href="style.css" />
  <audio id="bgMusic" loop preload="auto" playsinline webkit-playsinline>
    <source src="assets/sound/music/guanteySom.mp3" type="audio/mpeg">
  </audio>
  <audio id="ruidoG" loop preload="auto" playsinline webkit-playsinline>
    <source src="assets/sound/ruidog.mp3" type="audio/mpeg">
  </audio>
  <audio id="silbStart" preload="auto" playsinline webkit-playsinline>
    <source src="assets/sound/silb.mp3" type="audio/mpeg">
  </audio>
  <audio id="silbEnd" preload="auto" playsinline webkit-playsinline>
    <source src="assets/sound/silbfin.mp3" type="audio/mpeg">
  </audio>
  <audio id="kickSound" preload="auto" playsinline webkit-playsinline>
    <source src="assets/sound/kick.mp3" type="audio/mpeg">
  </audio>
  <audio id="golSound" preload="auto" playsinline webkit-playsinline>
    <source src="assets/sound/gol.mp3" type="audio/mpeg">
  </audio>
  <audio id="abuSound" preload="auto" playsinline webkit-playsinline>
    <source src="assets/sound/abu.mp3" type="audio/mpeg">
  </audio>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
  <!-- Splash -->
  <div id="splash" class="screen">
    <img id="portada" src="assets/im/portadaJuego.png" alt="Portada" />
    <input type="text" id="playerName" placeholder="Escribe tu nombre aquí" class="name-input" maxlength="20" />
    <button id="btnStart" class="btn-main">COMENZAR</button>
  </div>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div id="scoreBox">
      <div class="player-name" id="playerNameDisplay">Jugador</div>
      <div class="score-label">GOLES</div>
      <div id="score">0</div>
      <div class="shots-label">TIRO <span id="shotNum">1</span>/10</div>
    </div>
    <div id="message"></div>
    <div id="instructions">Desliza para patear</div>
    <div id="swipePointerLeft">
      <svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 50L10 10" stroke="white" stroke-width="6" stroke-linecap="round"/>
        <path d="M22 22L10 10L22 10" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M10 10L10 22" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div id="swipePointer">
      <svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M30 50L30 10" stroke="white" stroke-width="6" stroke-linecap="round"/>
        <path d="M20 20L30 10L40 20" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div id="swipePointerRight">
      <svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 50L50 10" stroke="white" stroke-width="6" stroke-linecap="round"/>
        <path d="M38 22L50 10L38 10" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M50 10L50 22" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>

  <!-- End screen -->
  <div id="endScreen" class="screen hidden">
    <div class="end-player-name" id="endPlayerName">Jugador</div>
    <div id="endTitle"></div>
    <div id="endScore"></div>
    <button id="btnScreenshot" class="btn-secondary">CAPTURAR PANTALLA</button>
    <button id="btnRestart" class="btn-main">Jugar otra vez</button>
  </div>

  <!-- Loading -->
  <div id="loading" class="screen hidden">
    <div class="spinner"></div>
    <div>Cargando...</div>
  </div>

  <!-- Rotate device overlay -->
  <div id="rotateOverlay">
    <div class="rotate-icon">📱</div>
    <div class="rotate-text">Gira tu teléfono de forma horizontal para poder jugar</div>
  </div>

  <!-- Confetti canvas -->
  <canvas id="confetti"></canvas>

  <canvas id="game"></canvas>

  <script type="module" src="main.js"></script>
</body>
</html>
